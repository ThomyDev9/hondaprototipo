services:
  backend:
    build:
      context: ./agendamiento-autos
      dockerfile: Dockerfile
    container_name: honda-backend
    restart: always
    env_file:
      - .env.docker
    environment:
      MYSQL_DB: cck_dev
      MYSQL_DB_ENCUESTA: bancopichinchaencuesta_dev
      UPLOADS_PATH: /app/uploads
    ports:
      - "4004:4004"
    volumes:
      - ./agendamiento-autos/uploads:/app/uploads

  frontend:
    build:
      context: ./agendamiento-autos-front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://172.19.10.61:4004}
    container_name: honda-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  procesador:
    image: python:3.11-slim
    container_name: honda-procesador
    restart: always
    volumes:
      - ./agendamiento-autos/scripts:/app/scripts
      - ./agendamiento-autos/uploads:/app/uploads
    environment:
      UPLOADS_PATH: /app/uploads
    working_dir: /app/scripts
    command: ["/app/scripts/run_loop.sh"]
