services:
  backend:
    build:
      context: ./backendCRM
      dockerfile: Dockerfile
    container_name: backendCRM
    restart: always
    env_file:
      - .env.docker
    environment:
      UPLOADS_PATH: /app/uploads
    ports:
      - "4004:4004"
    volumes:
      - ./backendCRM/uploads:/app/uploads

  frontend:
    build:
      context: ./frontendCRM
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://172.19.10.61:4004}
    container_name: frontendCRM
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend
